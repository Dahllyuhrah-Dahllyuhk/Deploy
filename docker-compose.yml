services:
  # ── Redis ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    networks:
      - appnet
    command: >
      redis-server
      --requirepass "${REDIS_PASSWORD}"
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MongoDB ───────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: mongo
    restart: unless-stopped
    networks:
      - appnet
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: matuabom
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Backend (Spring Boot) ─────────────────────────────────────────────
  be:
    env_file: .env
    image: 978022759902.dkr.ecr.ap-northeast-2.amazonaws.com/matuabom-be:latest
    container_name: be
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    networks:
      - appnet
    environment:
      SPRING_DATA_MONGODB_URI: "mongodb://mongo:27017/matuabom"
      POSTGRES_URL:            "${POSTGRES_URL}"
      POSTGRES_USER:           "${POSTGRES_USER}"
      POSTGRES_PASSWORD:       "${POSTGRES_PASSWORD}"
      REDIS_HOST:              "redis"
      REDIS_PORT:              "6379"
      REDIS_PASSWORD:          "${REDIS_PASSWORD}"
      JWT_SECRET:              "${JWT_SECRET}"
      KAKAO_CLIENT_ID:         "${KAKAO_CLIENT_ID}"
      KAKAO_CLIENT_SECRET:     "${KAKAO_CLIENT_SECRET}"
      GOOGLE_CLIENT_ID:        "${GOOGLE_CLIENT_ID}"
      GOOGLE_CLIENT_SECRET:    "${GOOGLE_CLIENT_SECRET}"
      GEMINI_API_KEY:          "${GEMINI_API_KEY}"
      FRONTEND_ORIGIN:         "https://matuabom.store"
      BACKEND_BASE_URL:        "https://matuabom.store"
      COOKIE_SECURE:           "true"
    expose:
      - "8080"
    healthcheck:
      # curl은 BE push 후 이미지에 포함됨. 현재는 wget으로 유지
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Frontend (Next.js) ────────────────────────────────────────────────
  fe:
    image: 978022759902.dkr.ecr.ap-northeast-2.amazonaws.com/matuabom-fe:latest
    container_name: fe
    restart: unless-stopped
    depends_on:
      - be
    networks:
      - appnet
    environment:
      NEXT_PUBLIC_API_BASE: "https://matuabom.store"
      NODE_ENV:             "production"
    expose:
      - "3000"

  # ── AI ────────────────────────────────────────────────────────────────
  ai:
    env_file: .env
    image: 978022759902.dkr.ecr.ap-northeast-2.amazonaws.com/matuabom-ai:latest
    container_name: ai
    restart: unless-stopped
    depends_on:
      - be
    networks:
      - appnet
    environment:
      GEMINI_API_KEY: "${GEMINI_API_KEY}"
    expose:
      - "5000"

  # ── Nginx ─────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    restart: unless-stopped
    depends_on:
      - fe
      - be
      - ai
    networks:
      - appnet
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

volumes:
  redis_data:
  mongo_data:

networks:
  appnet:
    driver: bridge
