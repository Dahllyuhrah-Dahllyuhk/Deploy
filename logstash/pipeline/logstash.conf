input {
  file {
    path => "/logs/matuabom.json"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => "json"
    type => "spring-boot"
  }
}

filter {
  # @timestamp 가 이미 LogstashEncoder 에서 세팅되므로 중복 파싱 불필요
  # level 필드 정규화 (대문자 통일)
  if [level] {
    mutate { uppercase => ["level"] }
  }

  # logger 이름 축약 (패키지 풀네임 → 마지막 클래스명)
  if [logger_name] {
    mutate {
      gsub => ["logger_name", "org\.dallyeo\.matuabom\.", ""]
    }
  }

  # 불필요 필드 제거
  mutate {
    remove_field => ["host", "agent", "ecs", "input", "log", "tags"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "matuabom-logs-%{+yyyy.MM.dd}"
    # ILM 사용 시 아래 주석 해제
    # ilm_enabled => true
    # ilm_rollover_alias => "matuabom-logs"
    # ilm_pattern => "{now/d}-000001"
  }

  # 디버깅용 — 문제 없으면 주석 처리
  stdout {
    codec => rubydebug
  }
}
