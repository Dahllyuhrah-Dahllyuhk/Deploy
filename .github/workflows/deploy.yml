name: Deploy Config & Full Stack

on:
  push:
    branches: [main, develop]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload config files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_KEY }}
          source:   "nginx/nginx.conf,docker-compose.yml"
          target:   "/home/ubuntu/Deploy"
          strip_components: 1

      - name: Reload nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /home/ubuntu/Deploy

            NGINX_RUNNING=$(docker compose ps nginx --status running -q 2>/dev/null | wc -l)

            if [ "$NGINX_RUNNING" -gt "0" ]; then
              docker compose exec nginx nginx -t || { echo "nginx 설정 오류"; exit 1; }
              docker compose exec nginx nginx -s reload
              echo "nginx 리로드 완료"
            else
              echo "전체 스택 기동"
              docker compose up -d
            fi
