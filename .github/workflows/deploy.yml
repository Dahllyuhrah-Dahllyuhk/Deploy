name: Deploy Config & Full Stack

on:
  push:
    branches: [main, develop]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload config files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_KEY }}
          source:   "nginx/nginx.conf,docker-compose.yml"
          target:   "/home/ubuntu/Deploy"
          strip_components: 1

      - name: Write .env file to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_KEY }}
          script: |
            cat > /home/ubuntu/Deploy/.env << 'EOF'
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }}
            KAKAO_CLIENT_SECRET=${{ secrets.KAKAO_CLIENT_SECRET }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            ENCRYPT_KEY=${{ secrets.ENCRYPT_KEY }}
            GOOGLE_WEBHOOK_TOKEN=${{ secrets.GOOGLE_WEBHOOK_TOKEN }}
            MONGODB_URI=${{ secrets.MONGODB_URI }}
            MONGODB_NAME=matuabom
            POSTGRES_URL=${{ secrets.POSTGRES_URL }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            ADMIN_SECRET=${{ secrets.ADMIN_SECRET }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            AI_SECRET=${{ secrets.AI_SECRET }}
            EOF

      - name: Reload nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /home/ubuntu/Deploy

            NGINX_RUNNING=$(docker compose ps nginx --status running -q 2>/dev/null | wc -l)

            if [ "$NGINX_RUNNING" -gt "0" ]; then
              docker compose exec nginx nginx -t || { echo "nginx 설정 오류"; exit 1; }
              docker compose exec nginx nginx -s reload
              echo "nginx 리로드 완료"
            else
              echo "전체 스택 기동"
              docker compose up -d
            fi
